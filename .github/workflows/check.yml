# .github/workflows/check.yml
#
# Lightweight PR gate: validates that all firmware targets compile, lints
# shell scripts, and checks YAML/Devicetree syntax. This workflow runs on
# every PR targeting main and must pass before merging.
#
# Design rationale:
#   - Compilation IS the test in ZMK — a successful `west build` proves the
#     keymap is structurally valid, all behaviors resolve, and the shield
#     definitions are consistent.
#   - ShellCheck catches the class of bash bugs that are invisible until
#     runtime (unquoted variables, word splitting, etc.).
#   - The matrix builds all 5 targets in parallel, so wall-clock time equals
#     the slowest single build (~60-90s), not the sum.
#   - No artifacts are uploaded — this is a gate, not a release. The build
#     workflow (build.yml) handles artifact production on merge to main.

name: PR Check

on:
  pull_request:
    branches: [main]
    paths:
      - "config/**"
      - "Dockerfile"
      - "entrypoint.sh"
      - "docker-compose.yml"
      - ".github/workflows/**"

# Cancel in-flight runs for the same PR when new commits are pushed.
# No point finishing a build for an already-superseded commit.
concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Job 1: Lint non-firmware files (shell scripts, YAML)
  # ──────────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      # ShellCheck: catches unquoted variables, word splitting, unused vars,
      # and other bash pitfalls in entrypoint.sh and any future scripts.
      - name: Lint shell scripts
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: "."
          severity: warning

      # Validate YAML syntax in west.yml and workflow files. A malformed
      # west.yml silently breaks `west init`, which surfaces as a cryptic
      # CMake error rather than a clear "your YAML is broken" message.
      - name: Validate YAML
        uses: ibiqlik/action-yamllint@ae1abb2821b567e96742aa776f7b62c9b6a26bc8 # v3
        with:
          file_or_dir: >-
            config/west.yml
            .github/workflows/
          config_data: |
            extends: default
            rules:
              line-length: disable
              truthy:
                check-keys: false
              document-start: disable

  # ──────────────────────────────────────────────────────────────────────
  # Job 2: Validate keymap structure
  # ──────────────────────────────────────────────────────────────────────
  validate-keymap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      # Structural check: each layer in a 6-column Corne must have exactly
      # 42 bindings. The Devicetree parser accepts wrong counts in some
      # cases, but the firmware will map keys to wrong positions at runtime.
      #
      # This regex-based check is intentionally simple. It counts binding
      # entries (tokens starting with & like &kp, &mo, &trans, &none)
      # between each `bindings = <` and `>;` block. It's not a full DT
      # parser, but it catches the most common mistake: accidentally adding
      # or removing a key when editing the layout.
      - name: Check binding counts per layer
        run: |
          KEYMAP="config/corne.keymap"
          EXPECTED=42  # 6-column Corne: 12 + 12 + 12 + 6 (3 thumb × 2)

          if [ ! -f "$KEYMAP" ]; then
            echo "::warning::No keymap file found at $KEYMAP, skipping"
            exit 0
          fi

          errors=0
          layer=0

          # Extract each bindings block content and count & tokens
          while IFS= read -r block; do
            layer=$((layer + 1))
            count=$(echo "$block" | grep -oE '&[a-z_]+' | wc -l)

            if [ "$count" -ne "$EXPECTED" ]; then
              echo "::error::Layer $layer has $count bindings, expected $EXPECTED"
              errors=$((errors + 1))
            else
              echo "Layer $layer: $count bindings ✓"
            fi
          done < <(
            # Scope to the keymap node ('keymap {' → EOF) so that custom behavior
            # definitions — which legitimately use their own `bindings = <...>`
            # (e.g. hold-taps) and live above the keymap node — are not miscounted
            # as layers. Then extract each layer's 'bindings = <' … '>;' block and
            # join it into a single line so `read` gets one record per layer.
            sed -n '/keymap {/,$p' "$KEYMAP" \
              | sed -n '/bindings = </,/>;/p' \
              | awk '/bindings = </{buf=""} {buf=buf " " $0} />;/{print buf}'
          )

          if [ "$layer" -eq 0 ]; then
            echo "::warning::No layers found in $KEYMAP"
          fi

          exit "$errors"

  # ──────────────────────────────────────────────────────────────────────
  # Job 3: Compile all firmware targets
  # ──────────────────────────────────────────────────────────────────────
  compile:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-dev-arm:stable

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: dongle
            board: seeeduino_xiao_ble
            shield: corne_dongle dongle_screen
            extra_cmake_args: ""
          - target: left
            board: nice_nano_v2
            shield: corne_left
            extra_cmake_args: >-
              -DCONFIG_ZMK_SPLIT=y
              -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
          - target: right
            board: nice_nano_v2
            shield: corne_right
            extra_cmake_args: >-
              -DCONFIG_ZMK_SPLIT=y
              -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
          - target: reset_xiao
            board: seeeduino_xiao_ble
            shield: settings_reset
            extra_cmake_args: ""
          - target: reset_nano
            board: nice_nano_v2
            shield: settings_reset
            extra_cmake_args: ""

    steps:
      - name: Checkout zmk-config
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Cache west modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .west
            zmk
            zephyr
            modules
            tools
            bootloader
            zmk-dongle-screen
          key: west-${{ hashFiles('config/west.yml') }}

      - name: Initialise west workspace
        run: |
          west init -l config/ || true
          west update
          west zephyr-export

      # The build itself is the test. If this step succeeds, the keymap is
      # valid, the shield definitions are consistent, and the Kconfig
      # resolves correctly. If it fails, the error output tells you exactly
      # what's wrong — missing behavior, wrong binding count, undefined
      # node reference, etc.
      - name: Compile ${{ matrix.target }}
        run: |
          west build -p -s zmk/app \
            -b "${{ matrix.board }}" \
            -- -DSHIELD="${{ matrix.shield }}" \
               ${{ matrix.extra_cmake_args }} \
               -DZMK_CONFIG="${GITHUB_WORKSPACE}/config" \
               -DZMK_EXTRA_MODULES="${GITHUB_WORKSPACE}/config/modules/ecaps-word"
