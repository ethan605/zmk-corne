# .github/workflows/build.yml
#
# Builds ZMK firmware for all targets and uploads artifacts.
# Mirrors the local Docker build setup — same west.yml manifest, same shields,
# same board names. The only difference is that GHA builds targets in parallel
# via the matrix strategy, whereas the local entrypoint.sh runs them sequentially.
#
# Triggers:
#   - Push to main: with branch protection enabled, this effectively means
#     "on PR merge" since direct pushes are blocked. The PR check workflow
#     (check.yml) gates the merge, so builds here are pre-validated.
#   - Manual dispatch: for building from any branch on-demand (e.g., when
#     accessing from a different machine without Docker).

name: Build ZMK Firmware

on:
  push:
    branches: [main]
    paths:
      - "config/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

# Only the latest push to main needs to produce artifacts.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      # Same base image as the local Dockerfile — ensures identical toolchain.
      # Change to zmkfirmware/zmk-dev-arm:4.1-branch for Path B (Zephyr 4.1).
      image: zmkfirmware/zmk-dev-arm:stable

    strategy:
      # Don't cancel other targets if one fails — you still want the
      # working UF2s even if one target has a build error.
      fail-fast: false
      matrix:
        include:
          # Numbered targets encode the recommended flashing order:
          #   00a/00b  settings reset (only needed on first flash or BT issues)
          #   01       dongle (central) — flash before halves
          #   02/03    left/right peripherals

          # --- Settings reset for XIAO (dongle) ---
          - target: 00a-reset_xiao
            board: seeeduino_xiao_ble # Path B: xiao_ble//zmk
            shield: settings_reset
            extra_cmake_args: ""

          # --- Settings reset for nice!nano (keyboard halves) ---
          - target: 00b-reset_nano
            board: nice_nano_v2 # Path B: nice_nano@2.0.0//zmk
            shield: settings_reset
            extra_cmake_args: ""

          # --- Dongle: central role, YADS screen shield layered on top ---
          - target: 01-dongle
            board: seeeduino_xiao_ble # Path B: xiao_ble//zmk
            shield: corne_dongle dongle_screen
            extra_cmake_args: ""

          # --- Left half: peripheral, no display ---
          - target: 02-left
            board: nice_nano_v2 # Path B: nice_nano@2.0.0//zmk
            shield: corne_left
            extra_cmake_args: >-
              -DCONFIG_ZMK_SPLIT=y
              -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

          # --- Right half: peripheral, no display ---
          - target: 03-right
            board: nice_nano_v2 # Path B: nice_nano@2.0.0//zmk
            shield: corne_right
            extra_cmake_args: >-
              -DCONFIG_ZMK_SPLIT=y
              -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

    steps:
      - name: Checkout zmk-config
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      # Cache the west workspace (Zephyr, modules, HALs).
      # Keyed on config/west.yml — if you change ZMK version or add
      # modules, the cache invalidates and west pulls fresh.
      - name: Cache west modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .west
            zmk
            zephyr
            modules
            tools
            bootloader
            zmk-dongle-screen
          key: west-${{ hashFiles('config/west.yml') }}

      - name: Initialise west workspace
        run: |
          # west init is idempotent if already initialised, but will fail
          # on re-runs within a cached workspace. The || true handles this.
          west init -l config/ || true
          west update
          west zephyr-export

      - name: Build ${{ matrix.target }}
        run: |
          west build -p -s zmk/app \
            -b "${{ matrix.board }}" \
            -- -DSHIELD="${{ matrix.shield }}" \
               ${{ matrix.extra_cmake_args }} \
               -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      # Upload each UF2 as a named artifact. After the workflow completes,
      # all five are downloadable from the Actions run page.
      - name: Upload ${{ matrix.target }}.uf2
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.target }}
          path: build/zephyr/zmk.uf2

  # Collect all individual artifacts into a single downloadable zip.
  # This is a convenience — instead of downloading 5 separate artifacts,
  # you get one "firmware" zip containing all UF2 files.
  bundle:
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: firmware

      # Flatten the directory structure: download-artifact creates
      # subdirectories per artifact name (firmware/dongle/zmk.uf2, etc.)
      # Rename each to its target name for clarity.
      - name: Rename UF2 files
        run: |
          mkdir -p output
          for dir in firmware/*/; do
            target=$(basename "$dir")
            cp "$dir/zmk.uf2" "output/${target}.uf2"
          done
          ls -la output/

      - name: Upload firmware bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: firmware
          path: output/*.uf2
