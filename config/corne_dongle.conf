# --- Prospector Display Configuration ---
# No ambient light sensor wired on this dongle → fixed brightness.
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n

# Fixed display brightness (1-100). Requires USE_AMBIENT_LIGHT_SENSOR=n above
# (Kconfig: depends on !PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR).
CONFIG_PROSPECTOR_FIXED_BRIGHTNESS=60

# Screen mounted upright; set y if the dongle is mounted inverted.
CONFIG_PROSPECTOR_ROTATE_DISPLAY_180=n

# Layer-roller capitalization. The roller ALWAYS renders ALL-CAPS regardless of this
# option: its font (FRAC_Regular_48 / FRAC_Thin_48 in the module's layer_roller.c) is an
# all-caps display typeface, so lowercase code points are drawn as capitals. The layer
# text itself is the mixed-case display-name; no .conf changes the visual case. (This
# option is also a no-op upstream anyway: layer_roller.c gates on CONFIG_LAYER_ROLLER_ALL_CAPS
# while the Kconfig defines CONFIG_PROSPECTOR_LAYER_ROLLER_ALL_CAPS -- a symbol-name typo.)
# True mixed case would require swapping the roller font in the module source (a fork);
# not pursued. Left at n.
CONFIG_PROSPECTOR_LAYER_ROLLER_ALL_CAPS=n

# Display work-queue thread stack. ZMK core defaults this to 2048, which wins
# over Prospector's `default 4096` (Kconfig evaluates the core default first).
# 2048 is too small for Prospector's LVGL status screen and can stall/freeze the
# display thread (e.g. on BLE reconnect). Set 4096 explicitly, matching the value
# Prospector ships commented-out in prospector_adapter.conf.
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=4096

# --- General ZMK Settings ---
# Increase BLE TX power for better range (optional)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
